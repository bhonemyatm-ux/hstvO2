<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HST 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 24px;
            box-shadow: 0 30px 90px rgba(0,0,0,0.2);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            animation: slideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            padding: 40px 30px;
            text-align: center;
            border-bottom: 3px solid #e2e8f0;
        }

        .logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .auth-header h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 8px;
        }

        .auth-header p {
            color: #718096;
            font-size: 15px;
        }

        .auth-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #4a5568;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }
.logo img {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
}
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.5);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 3px solid #667eea;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e2e8f0;
        }

        .divider span {
            background: white;
            padding: 0 15px;
            color: #a0aec0;
            font-size: 14px;
            font-weight: 600;
            position: relative;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            padding: 14px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover:not(:disabled) {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .forgot-link {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s;
        }

        .forgot-link a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .error-message {
            background: #fff5f5;
            color: #e53e3e;
            border: 1px solid #feb2b2;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        .success-message {
            background: #f0fff4;
            color: #38a169;
            border: 1px solid #9ae6b4;
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hint-text {
            color: #a0aec0;
            font-size: 13px;
            margin-top: 8px;
            display: block;
        }

        @media (max-width: 480px) {
            .auth-container { border-radius: 20px; }
            .auth-header { padding: 30px 20px; }
            .auth-body { padding: 30px 20px; }
            .social-login { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <!-- Header -->
        <div class="auth-header">
           <div class="logo">
    <img src="hstlogo.jpg" alt="HST Logo" onerror="this.style.display='none'; this.parentNode.innerHTML='🚀';">
</div>
            <h1>HST 2026</h1>
            <p>High Schooler's Tool Myanmar</p>
        </div>

        <!-- Body -->
        <div class="auth-body">
            <!-- Messages -->
            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

          
            <!-- Email/Password Form -->
            <form id="authForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="email">📧 Email Address</label>
                    <input type="email" id="email" placeholder="your@email.com" required autocomplete="email">
                    <small class="hint-text">Use a valid email you can access</small>
                </div>

                <div class="form-group">
                    <label for="password">🔒 Password</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6" autocomplete="current-password">
                    <small class="hint-text">Minimum 6 characters</small>
                </div>

                <button type="button" class="btn btn-primary" id="loginBtn" onclick="login()">
                     Login
                </button>

                <button type="button" class="btn btn-secondary" id="signupBtn" onclick="signup()">
                     Create Account
                </button>
            </form>

            <div class="forgot-link">
                <a href="#" onclick="forgotPassword()">Forgot Password?</a>
            </div>
        </div>
    </div>

    <script type="module">
        // ✅ COMPLETE IMPORTS
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { 
            getAuth, 
            createUserWithEmailAndPassword, 
            signInWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            FacebookAuthProvider,
            sendPasswordResetEmail,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
        import { 
            getFirestore, 
            setDoc, 
            doc, 
            getDoc 
        } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCqcET4vhCP-fRZi4AVDIbmh9J6__Ec8l0",
            authDomain: "hst-mm.firebaseapp.com",
            projectId: "hst-mm",
            storageBucket: "hst-mm.appspot.com",
            messagingSenderId: "261062104857",
            appId: "1:261062104857:web:99da060e35650b69919788"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ✅ HELPER: Get input values safely
        function getInputs() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            return { email, password };
        }

        // ✅ SHOW/HIDE MESSAGES
        function showError(message) {
            const errorEl = document.getElementById('errorMsg');
            errorEl.textContent = '❌ ' + message;
            errorEl.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function showSuccess(message) {
            const successEl = document.getElementById('successMsg');
            successEl.textContent = '✅ ' + message;
            successEl.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const loginBtn = document.getElementById('loginBtn');
            const signupBtn = document.getElementById('signupBtn');
            const googleBtn = document.getElementById('googleBtn');
            const fbBtn = document.getElementById('fbBtn');
            
            overlay.style.display = show ? 'flex' : 'none';
            loginBtn.disabled = show;
            signupBtn.disabled = show;
            googleBtn.disabled = show;
            fbBtn.disabled = show;
        }

        // ✅ CREATE/UPDATE USER DOC (WITH MERGE)
        async function ensureUserDoc(user, additionalData = {}) {
            const docRef = doc(db, "users", user.uid);
            const snap = await getDoc(docRef);

            const defaultData = {
                name: user.displayName || user.email.split('@')[0],
                email: user.email,
                city: "",
                educationLevel: "school",
                school: "",
                grade: "",
                stream: "",
                university: "",
                major: "",
                year: "",
                bio: "",
                avatar: user.photoURL || "",
                certificates: [],
                createdAt: snap.exists() ? snap.data().createdAt : new Date().toISOString(),
                updatedAt: new Date().toISOString(),
                ...additionalData
            };

            // ✅ USE merge: true TO PREVENT DATA LOSS
            await setDoc(docRef, defaultData, { merge: true });
            return docRef;
        }

        // ✅ LOGIN FUNCTION (PRODUCTION-READY)
        async function login() {
            const { email, password } = getInputs();

            // Validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            showLoading(true);

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Ensure user doc exists (with merge)
                await ensureUserDoc(user);

                showSuccess('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                let message = error.message;
                
                if (error.code === 'auth/user-not-found') {
                    message = 'No account found with this email. Please sign up first.';
                } else if (error.code === 'auth/wrong-password') {
                    message = 'Incorrect password. Please try again.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Invalid email address format.';
                } else if (error.code === 'auth/too-many-requests') {
                    message = 'Too many failed attempts. Please try again later.';
                }

                showError(message);
            } finally {
                showLoading(false);
            }
        }

        // ✅ SIGNUP FUNCTION (PRODUCTION-READY)
        async function signup() {
            const { email, password } = getInputs();

            // Validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            showLoading(true);

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Create complete user document (with merge for safety)
                await ensureUserDoc(user);

                showSuccess('Account created successfully! Setting up your profile...');
                setTimeout(() => {
                    window.location.href = 'edit-profile.html';
                }, 1500);

            } catch (error) {
                console.error('Signup error:', error);
                let message = error.message;
                
                if (error.code === 'auth/email-already-in-use') {
                    message = 'This email is already registered. Please login instead.';
                } else if (error.code === 'auth/weak-password') {
                    message = 'Password is too weak. Use at least 6 characters.';
                } else if (error.code === 'auth/invalid-email') {
                    message = 'Invalid email address format.';
                }

                showError(message);
            } finally {
                showLoading(false);
            }
        }

        // ✅ SOCIAL LOGIN (PRODUCTION-READY)
        async function socialLogin(provider) {
            showLoading(true);
            
            try {
                let authProvider;
                
                if (provider === 'google') {
                    authProvider = new GoogleAuthProvider();
                    authProvider.addScope('email');
                    authProvider.addScope('profile');
                } else if (provider === 'facebook') {
                    authProvider = new FacebookAuthProvider();
                    authProvider.addScope('email');
                    authProvider.addScope('public_profile');
                } else {
                    showError('Invalid login provider');
                    showLoading(false);
                    return;
                }

                const result = await signInWithPopup(auth, authProvider);
                const user = result.user;

                // Create/update user doc (with merge)
                await ensureUserDoc(user);

                showSuccess('Welcome! Setting up your profile...');
                setTimeout(() => {
                    window.location.href = 'edit-profile.html';
                }, 1000);

            } catch (error) {
                console.error('Social login error:', error);
                
                if (error.code === 'auth/popup-closed-by-user') {
                    // User closed popup - silent fail
                    return;
                } else if (error.code === 'auth/unauthorized-domain') {
                    showError('This domain is not authorized. Please contact support.');
                } else if (error.code === 'auth/popup-blocked') {
                    showError('Popup was blocked. Please allow popups for this site.');
                } else {
                    showError('Social login failed: ' + error.message);
                }
            } finally {
                showLoading(false);
            }
        }

        // ✅ FORGOT PASSWORD (IMPROVED UX)
        async function forgotPassword() {
            const { email } = getInputs();

            if (!email) {
                showError('Please enter your email address first');
                return;
            }

            if (!email.includes('@') || !email.includes('.')) {
                showError('Please enter a valid email address');
                return;
            }

            showLoading(true);

            try {
                await sendPasswordResetEmail(auth, email);
                // ✅ Always show success (security best practice)
                showSuccess('If an account exists with this email, a password reset link has been sent.');
            } catch (error) {
                console.error('Password reset error:', error);
                // Still show success for security (don't reveal if email exists)
                showSuccess('If an account exists with this email, a password reset link has been sent.');
            } finally {
                showLoading(false);
            }
        }

        // ✅ EXPOSE FUNCTIONS GLOBALLY (CRITICAL FOR MODULE)
        window.login = login;
        window.signup = signup;
        window.socialLogin = socialLogin;
        window.forgotPassword = forgotPassword;

        // ✅ SMART AUTO-REDIRECT (FIXED - NOT AGGRESSIVE)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Only redirect if NOT already on auth pages
                const currentPath = window.location.pathname;
                const isAuthPage = currentPath.includes('login.html') || 
                                   currentPath.includes('signup.html') ||
                                   currentPath.includes('index.html');
                
                if (!isAuthPage && !currentPath.includes('profile.html') && !currentPath.includes('edit-profile.html')) {
                    window.location.href = 'profile.html';
                }
            }
        });

        // ✅ PRE-FILL FOR TESTING (DEV ONLY - REMOVE IN PRODUCTION)
        // Uncomment for easier testing:
        /*
        window.addEventListener('load', () => {
            document.getElementById('email').value = 'test@example.com';
            document.getElementById('password').value = '123456';
        });
        */
    </script>
</body>
</html>
