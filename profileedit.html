<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile - HST 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(5px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .edit-container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.15);
            overflow: hidden;
            animation: slideIn 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(40px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .edit-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 35px 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .edit-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1.5" fill="white" opacity="0.05"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
        }

        .edit-header h1 {
            color: white;
            font-size: 32px;
            font-weight: 800;
            z-index: 1;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .close-btn {
            background: rgba(255,255,255,0.25);
            color: white;
            border: 2px solid rgba(255,255,255,0.4);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 22px;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            backdrop-filter: blur(15px);
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: white;
            color: #667eea;
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 8px 25px rgba(255,255,255,0.3);
        }

        .edit-content {
            padding: 50px;
        }

        .success-message, .error-message {
            padding: 18px 24px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: none;
            animation: slideDown 0.5s ease;
            font-weight: 600;
        }

        .success-message {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error-message {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-section {
            margin-bottom: 45px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 800;
            color: #2d3748;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 12px;
            border-bottom: 4px solid transparent;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 60px;
            height: 4px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .avatar-upload {
            text-align: center;
            margin-bottom: 40px;
        }

        .avatar-preview {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 5px solid #667eea;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }

        .avatar-preview:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(102, 126, 234, 0.45);
        }

        #avatarInput {
            display: none;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            color: #4a5568;
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            outline: none;
            background: #fafbfc;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 140px;
            font-family: inherit;
        }

        .form-group small {
            color: #a0aec0;
            font-size: 13px;
            margin-top: 8px;
            display: block;
        }

        .char-counter {
            position: absolute;
            right: 12px;
            bottom: 12px;
            color: #a0aec0;
            font-size: 13px;
            font-weight: 600;
        }

        .education-toggle {
            display: flex;
            gap: 18px;
            margin-bottom: 25px;
            background: #f7fafc;
            padding: 8px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
        }

        .edu-option {
            flex: 1;
            padding: 18px 24px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            font-weight: 700;
            font-size: 15px;
            color: #718096;
            border: 2px solid transparent;
        }

        .edu-option.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        .edu-option:hover:not(.active) {
            background: #edf2f7;
            color: #4a5568;
            transform: translateY(-1px);
        }

        #schoolFields, #universityFields {
            display: none;
            animation: fadeInSlide 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #schoolFields.active, #universityFields.active {
            display: block;
        }

        @keyframes fadeInSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .certificates-list {
            margin-bottom: 25px;
        }

        .certificate-item {
            background: linear-gradient(135deg, #f8f9ff 0%, #f0f2ff 100%);
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            position: relative;
            animation: slideIn 0.4s ease;
            transition: all 0.3s ease;
        }

        .certificate-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.1);
            border-color: #cbd5e0;
        }

        .remove-cert {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ff6b6b 0%, #ff5252 100%);
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 800;
            font-size: 18px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .remove-cert:hover {
            background: linear-gradient(135deg, #ff4444 0%, #ff3838 100%);
            transform: scale(1.15) rotate(90deg);
            box-shadow: 0 6px 20px rgba(255, 71, 107, 0.4);
        }

        .add-cert-btn {
            background: white;
            color: #667eea;
            border: 3px dashed #c3d7ff;
            padding: 20px 30px;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            margin-bottom: 20px;
        }

        .add-cert-btn:hover {
            background: linear-gradient(135deg, #f0f4ff 0%, #e6eeff 100%);
            border-style: solid;
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2);
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 3px solid #e2e8f0;
        }

        .btn {
            flex: 1;
            padding: 20px 40px;
            border: none;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-save:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .btn-save:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .btn-cancel {
            background: white;
            color: #667eea;
            border: 3px solid #667eea;
            font-weight: 800;
        }

        .btn-cancel:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 15px; }
            .edit-header { padding: 25px 30px; }
            .edit-header h1 { font-size: 26px; }
            .edit-content { padding: 30px 25px; }
            .form-grid { grid-template-columns: 1fr; gap: 20px; }
            .action-buttons, .education-toggle { flex-direction: column; }
            .education-toggle { gap: 12px; }
        }

        @media (max-width: 480px) {
            .edit-content { padding: 25px 20px; }
        }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="edit-container">
        <!-- Header -->
        <div class="edit-header">
            <h1>✏️ Edit Profile</h1>
            <button class="close-btn" onclick="closeEditor()">×</button>
        </div>

        <!-- Content -->
        <div class="edit-content">
            <!-- Messages -->
            <div class="success-message" id="successMsg">
                ✅ Profile updated successfully!
            </div>
            <div class="error-message" id="errorMsg"></div>

            <form id="editForm">
                <!-- Avatar Upload -->
                <div class="avatar-upload">
                    <img src="https://via.placeholder.com/140/667eea/ffffff?text=👤" alt="Profile Picture" class="avatar-preview" id="avatarPreview">
                    <br><br>
                    <label for="avatarInput" class="upload-btn">
                        📷 Change Photo
                    </label>
                    <input type="file" id="avatarInput" accept="image/*" onchange="previewAvatar()">
                </div>

                <!-- Basic Info -->
                <div class="form-section">
                    <h2 class="section-title">👤 Basic Information</h2>
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="fullName">Full Name *</label>
                            <input type="text" id="fullName" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group">
                            <label for="city">City *</label>
                            <input type="text" id="city" placeholder="Enter your city" required>
                        </div>
                    </div>
                </div>

                <!-- Education Level -->
                <div class="form-section">
                    <h2 class="section-title">🎓 Education Level</h2>
                    
                    <div class="education-toggle">
                        <div class="edu-option active" onclick="setEducationLevel('school')" id="schoolOption">
                            🏫 Grade 6-12
                        </div>
                        <div class="edu-option" onclick="setEducationLevel('university')" id="uniOption">
                            🎓 University
                        </div>
                    </div>

                    <!-- School Fields -->
                    <div id="schoolFields" class="active">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="grade">Current Grade *</label>
                                <select id="grade" required>
                                    <option value="">Select Grade</option>
                                    <option value="G6">Grade 6</option>
                                    <option value="G7">Grade 7</option>
                                    <option value="G8">Grade 8</option>
                                    <option value="G9">Grade 9</option>
                                    <option value="G10">Grade 10</option>
                                    <option value="G11">Grade 11</option>
                                    <option value="G12">Grade 12</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="schoolName">School Name *</label>
                                <input type="text" id="schoolName" placeholder="e.g., Basic Education High School">
                            </div>
                            <div class="form-group">
                                <label for="stream">Stream</label>
                                <select id="stream">
                                    <option value="">Select Stream</option>
                                    <option value="Science">Science (Biology)</option>
                                    <option value="Arts">Arts (Economic)</option>
                                    <option value="Commerce">Commerce (STEM)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- University Fields -->
                    <div id="universityFields">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="university">University *</label>
                                <input type="text" id="university" placeholder="e.g., University of Computer Studies">
                            </div>
                            <div class="form-group">
                                <label for="major">Major *</label>
                                <input type="text" id="major" placeholder="e.g., Computer Science (B.C.Sc)">
                            </div>
                            <div class="form-group">
                                <label for="year">Year</label>
                                <select id="year">
                                    <option value="">Select Year</option>
                                    <option value="1">Year 1</option>
                                    <option value="2">Year 2</option>
                                    <option value="3">Year 3</option>
                                    <option value="4">Year 4</option>
                                    <option value="5">Year 5</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Bio -->
                <div class="form-section">
                    <h2 class="section-title">📝 About Me</h2>
                    <div class="form-group" style="position: relative;">
                        <label for="bio">Bio (Optional)</label>
                        <textarea id="bio" placeholder="Tell us about yourself, your interests, hobbies, and what you hope to achieve with HST 2026..."></textarea>
                        <small>Share your story - max 500 characters</small>
                        <div class="char-counter" id="charCounter">0/500</div>
                    </div>
                </div>

                <!-- Certificates -->
                <div class="form-section">
                    <h2 class="section-title">🏆 Certificates & Achievements</h2>
                    <div class="certificates-list" id="certificatesList">
                        <!-- Dynamic certificates -->
                    </div>
                    <button type="button" class="add-cert-btn" onclick="addCertificate()">
                        ➕ Add Certificate
                    </button>
                </div>

                <!-- Action Buttons -->
                <div class="action-buttons">
                    <button type="button" class="btn btn-cancel" onclick="closeEditor()">Cancel</button>
                    <button type="button" class="btn btn-save" id="saveBtn" onclick="saveProfile()">
                        💾 Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqcET4vhCP-fRZi4AVDIbmh9J6__Ec8l0",
            authDomain: "hst-mm.firebaseapp.com",
            projectId: "hst-mm",
            storageBucket: "hst-mm.appspot.com",
            messagingSenderId: "261062104857",
            appId: "1:261062104857:web:99da060e35650b69919788"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = {};
        let certCount = 0;

        // Expose functions globally
        window.closeEditor = closeEditor;
        window.previewAvatar = previewAvatar;
        window.setEducationLevel = setEducationLevel;
        window.addCertificate = addCertificate;
        window.removeCertificate = removeCertificate;
        window.saveProfile = saveProfile;

        // Initialize app
        async function init() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    await loadUserData();
                } else {
                    window.location.href = 'login.html';
                }
            });
        }

        async function loadUserData() {
            try {
                const docRef = doc(db, "users", currentUser.uid);
                const snap = await getDoc(docRef);
                
                if (snap.exists()) {
                    userData = { ...snap.data(), certificates: snap.data().certificates || [] };
                } else {
                    userData = { certificates: [] };
                }
                populateForm();
            } catch (error) {
                showError('Failed to load profile data');
            }
        }
// In your edit-profile.html saveProfile() function

async function saveProfile() {
    try {
        const name = document.getElementById('fullName').value.trim();
        const city = document.getElementById('city').value.trim();

        if (!name || !city) {
            showError('Please fill in all required fields');
            return;
        }

        showLoading(true);

        // Build complete user object
        const userData = {
            name: name,
            city: city,
            email: currentUser.email, // Keep email
            educationLevel: userData.educationLevel || 'school',
            
            // School fields
            school: userData.educationLevel === 'school' ? document.getElementById('schoolName').value.trim() : '',
            grade: userData.educationLevel === 'school' ? document.getElementById('grade').value : '',
            stream: userData.educationLevel === 'school' ? document.getElementById('stream').value : '',
            
            // University fields
            university: userData.educationLevel === 'university' ? document.getElementById('university').value.trim() : '',
            major: userData.educationLevel === 'university' ? document.getElementById('major').value.trim() : '',
            year: userData.educationLevel === 'university' ? document.getElementById('year').value : '',
            
            bio: document.getElementById('bio').value.trim(),
            avatar: document.getElementById('avatarPreview').src,
            
            // Certificates
            certificates: [],
            
            // Timestamps
            updatedAt: new Date().toISOString(),
            createdAt: userData.createdAt || new Date().toISOString()
        };

        // Collect certificates safely
        document.querySelectorAll('.certificate-item').forEach(item => {
            const title = item.querySelector('.cert-title').value.trim();
            const issuer = item.querySelector('.cert-issuer').value.trim();
            const date = item.querySelector('.cert-date').value;
            
            if (title && issuer && date) {
                userData.certificates.push({ title, issuer, date });
            }
        });

        // Save with merge to preserve any existing fields
        await setDoc(doc(db, "users", currentUser.uid), userData, { merge: true });

        showSuccess();
        
    } catch (error) {
        console.error('Save error:', error);
        showError('Failed to save: ' + error.message);
    } finally {
        showLoading(false);
    }
}

        function populateForm() {
            // Basic info
            document.getElementById('fullName').value = userData.name || '';
            document.getElementById('city').value = userData.city || '';
            document.getElementById('avatarPreview').src = userData.avatar || 'https://via.placeholder.com/140/667eea/ffffff?text=👤';
            document.getElementById('bio').value = userData.bio || '';

            // Education
            setEducationLevel(userData.educationLevel || 'school');

            // School fields
            document.getElementById('grade').value = userData.grade || '';
            document.getElementById('schoolName').value = userData.school || '';
            document.getElementById('stream').value = userData.stream || '';

            // University fields
            document.getElementById('university').value = userData.university || '';
            document.getElementById('major').value = userData.major || '';
            document.getElementById('year').value = userData.year || '';

            // Load certificates
            userData.certificates.forEach(cert => addCertificate(cert));

            updateCharCounter();
        }

        function setEducationLevel(level) {
            userData.educationLevel = level;
            
            // Update toggle buttons
            document.getElementById('schoolOption').classList.toggle('active', level === 'school');
            document.getElementById('uniOption').classList.toggle('active', level === 'university');
            
            // Show/hide fields
            document.getElementById('schoolFields').classList.toggle('active', level === 'school');
            document.getElementById('universityFields').classList.toggle('active', level === 'university');
        }

        function previewAvatar() {
            const file = document.getElementById('avatarInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('avatarPreview').src = e.target.result;
                    userData.avatar = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function addCertificate(data = null) {
            const certId = `cert-${certCount++}`;
            const container = document.getElementById('certificatesList');
            
            const certDiv = document.createElement('div');
            certDiv.className = 'certificate-item';
            certDiv.id = certId;
            certDiv.innerHTML = `
                <button type="button" class="remove-cert" onclick="removeCertificate('${certId}')">×</button>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Certificate Title *</label>
                        <input type="text" class="cert-title" placeholder="e.g., Python Programming Certification" value="${data?.title || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Issuer/Organization *</label>
                        <input type="text" class="cert-issuer" placeholder="e.g., Coursera - University of Michigan" value="${data?.issuer || ''}" required>
                    </div>
                    <div class="form-group">
                        <label>Completion Date *</label>
                        <input type="month" class="cert-date" value="${data?.date || ''}" required>
                    </div>
                </div>
            `;
            
            container.appendChild(certDiv);
        }

        function removeCertificate(certId) {
            const cert = document.getElementById(certId);
            if (cert) {
                cert.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => cert.remove(), 300);
            }
        }

        function updateCharCounter() {
            const bio = document.getElementById('bio');
            const counter = document.getElementById('charCounter');
            const length = bio.value.length;
            counter.textContent = `${length}/500`;
            
            if (length > 450) {
                counter.style.color = '#e53e3e';
            } else if (length > 400) {
                counter.style.color = '#dd6b20';
            } else {
                counter.style.color = '#a0aec0';
            }
        }

        async function saveProfile() {
            try {
                // Validation
                const name = document.getElementById('fullName').value.trim();
                const city = document.getElementById('city').value.trim();

                if (!name || !city) {
                    showError('Please fill in all required fields (Name and City)');
                    return;
                }

                // Education validation
                if (userData.educationLevel === 'school') {
                    const grade = document.getElementById('grade').value;
                    const school = document.getElementById('schoolName').value.trim();
                    if (!grade || !school) {
                        showError('Please fill in Grade and School Name');
                        return;
                    }
                } else {
                    const university = document.getElementById('university').value.trim();
                    const major = document.getElementById('major').value.trim();
                    if (!university || !major) {
                        showError('Please fill in University and Major');
                        return;
                    }
                }

                // Show loading
                showLoading(true);

                // Collect data
                userData.name = name;
                userData.city = city;
                userData.bio = document.getElementById('bio').value.trim();
                userData.avatar = document.getElementById('avatarPreview').src;

                // Education data
                if (userData.educationLevel === 'school') {
                    userData.grade = document.getElementById('grade').value;
                    userData.school = document.getElementById('schoolName').value.trim();
                    userData.stream = document.getElementById('stream').value;
                    userData.university = '';
                    userData.major = '';
                    userData.year = '';
                } else {
                    userData.university = document.getElementById('university').value.trim();
                    userData.major = document.getElementById('major').value.trim();
                    userData.year = document.getElementById('year').value;
                    userData.grade = '';
                    userData.school = '';
                    userData.stream = '';
                }

                // Certificates
                userData.certificates = [];
                document.querySelectorAll('.certificate-item').forEach(item => {
                    const title = item.querySelector('.cert-title').value.trim();
                    const issuer = item.querySelector('.cert-issuer').value.trim();
                    const date = item.querySelector('.cert-date').value;
                    
                    if (title && issuer && date) {
                        userData.certificates.push({ title, issuer, date });
                    }
                });

                // Save to Firestore
                await setDoc(doc(db, "users", currentUser.uid), userData, { merge: true });

                // Success
                showSuccess();
                
            } catch (error) {
                console.error('Save error:', error);
                showError('Failed to save profile. Please try again.');
            } finally {
                showLoading(false);
            }
        }

        function showLoading(show) {
            const overlay = document.getElementById('loadingOverlay');
            const saveBtn = document.getElementById('saveBtn');
            overlay.style.display = show ? 'flex' : 'none';
            saveBtn.disabled = show;
            saveBtn.textContent = show ? 'Saving...' : '💾 Save Changes';
        }

        function showSuccess() {
            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            
            setTimeout(() => {
                window.location.href = 'profile.html';
            }, 2000);
        }

        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }

        function closeEditor() {
            if (confirm('Discard changes and go back?')) {
                window.location.href = 'profile.html';
            }
        }

        // Event Listeners
        document.getElementById('bio').addEventListener('input', function() {
            if (this.value.length > 500) {
                this.value = this.value.substring(0, 500);
            }
            updateCharCounter();
        });

        // Form validation on submit
        document.getElementById('editForm').addEventListener('submit', function(e) {
            e.preventDefault();
            saveProfile();
        });

        // Initialize
        init();
    </script>
</body>
</html>
