<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Discovery Quiz | High Schooler's Tool</title>
    <link rel="stylesheet" href="hst.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6366f1;
            --secondary-color: #8b5cf6;
            --accent-color: #ec4899;
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --tech-color: #3b82f6;
            --health-color: #10b981;
            --business-color: #f59e0b;
            --creative-color: #ec4899;

            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border-color: #e2e8f0;
            --shadow: 0 10px 40px rgba(0,0,0,0.08);
            --shadow-lg: 0 20px 60px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .floating-shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s infinite ease-in-out;
        }

        .shape-1 {
            top: 10%;
            left: 10%;
            width: 100px;
            height: 100px;
            background: white;
            border-radius: 50%;
            animation-delay: 0s;
        }

        .shape-2 {
            top: 60%;
            right: 15%;
            width: 150px;
            height: 150px;
            background: white;
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation-delay: 3s;
        }

        .shape-3 {
            bottom: 10%;
            left: 20%;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-50px) rotate(180deg); }
        }

        /* Navigation */
        .career-nav {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .career-nav .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
        }

        .btn-home {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-home:hover {
            background: white;
            color: #6366f1;
            transform: translateY(-2px);
        }

        /* Main Container */
        .career-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
            position: relative;
            z-index: 1;
        }

        /* Welcome Section */
        .welcome-section {
            text-align: center;
            margin-bottom: 3rem;
        }

        .welcome-section h1 {
            font-size: 3rem;
            color: white;
            margin-bottom: 1rem;
            animation: fadeInDown 0.8s ease;
        }

        .welcome-section p {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease;
        }

        .start-btn {
            background: white;
            color: #6366f1;
            padding: 1.25rem 3rem;
            border-radius: 16px;
            border: none;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease;
        }

        .start-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
        }

        /* Quiz Section */
        .quiz-section {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .quiz-section.active {
            display: block;
        }

        .quiz-card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            box-shadow: var(--shadow-lg);
            margin-bottom: 2rem;
        }

        .progress-container {
            margin-bottom: 2rem;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .progress-bar-bg {
            background: var(--border-color);
            height: 8px;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        .question-container {
            margin-bottom: 2rem;
        }

        .question-icon {
            font-size: 4rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            text-align: center;
            margin-bottom: 2rem;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .answer-btn {
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .answer-btn:hover {
            border-color: var(--primary-color);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
        }

        .answer-btn.selected {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        .answer-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .answer-text {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .quiz-nav-buttons {
            display: flex;
            gap: 1rem;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .quiz-btn {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-previous {
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }

        .btn-previous:hover {
            border-color: var(--primary-color);
        }

        .btn-next {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            flex: 1;
        }

        .btn-next:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-next:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        .results-section {
            display: none;
            animation: fadeIn 0.8s ease;
        }

        .results-section.active {
            display: block;
        }

        .results-header {
            text-align: center;
            color: white;
            margin-bottom: 3rem;
        }

        .results-header h2 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .results-header p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        /* Career Cards */
        .career-card {
            background: white;
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s ease;
            animation: dropDown 0.6s ease;
            animation-fill-mode: both;
        }

        .career-card:nth-child(1) { animation-delay: 0.2s; }
        .career-card:nth-child(2) { animation-delay: 0.4s; }
        .career-card:nth-child(3) { animation-delay: 0.6s; }

        @keyframes dropDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .career-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 80px rgba(0,0,0,0.15);
        }

        .career-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1.5rem;
        }

        .career-title-section {
            flex: 1;
        }

        .career-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .career-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .match-badge {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1rem;
        }

        .career-description {
            color: var(--text-secondary);
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }

        .career-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: var(--bg-primary);
            border-radius: 12px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .explore-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .explore-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .explore-btn.active {
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        /* Universities Dropdown */
        .universities-dropdown {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            margin-top: 1.5rem;
        }

        .universities-dropdown.expanded {
            max-height: 1000px;
        }

        .uni-section {
            margin-bottom: 1.5rem;
        }

        .uni-section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .uni-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .uni-item {
            background: var(--bg-primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .uni-item:hover {
            border-color: var(--primary-color);
            transform: translateX(5px);
        }

        .uni-name {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .uni-tag {
            display: inline-block;
            background: var(--primary-color);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 12px;
            font-size: 0.8rem;
            margin-left: 0.5rem;
        }

        .uni-tag.abroad {
            background: var(--success-color);
        }

        .scholarship-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.9rem;
            margin-top: 0.25rem;
        }

        .scholarship-link:hover {
            text-decoration: underline;
        }

        /* Retake Button */
        .retake-section {
            text-align: center;
            margin-top: 3rem;
        }

        .retake-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 1rem 2.5rem;
            border-radius: 12px;
            border: 2px solid white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retake-btn:hover {
            background: white;
            color: #6366f1;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .career-container {
                padding: 2rem 1rem;
            }

            .welcome-section h1 {
                font-size: 2rem;
            }

            .welcome-section p {
                font-size: 1.1rem;
            }

            .quiz-card {
                padding: 2rem 1.5rem;
            }

            .question-text {
                font-size: 1.4rem;
            }

            .answers-grid {
                grid-template-columns: 1fr;
            }

            .career-stats {
                grid-template-columns: 1fr;
            }

            .quiz-nav-buttons {
                flex-direction: column;
            }

            .btn-previous {
                width: 100%;
            }
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="bg-animation">
        <div class="floating-shape shape-1"></div>
        <div class="floating-shape shape-2"></div>
        <div class="floating-shape shape-3"></div>
    </div>

    <!-- Navigation -->
    <nav class="career-nav">
        <div class="container">
            <a href="hst.html" class="nav-brand">
                <span>🎯</span>
                <span>Career Discovery</span>
            </a>
            <a href="hst.html" class="btn-home">← Home</a>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="career-container">
        <!-- Welcome Section -->
        <div class="welcome-section" id="welcomeSection">
            <h1>🚀 Discover Your Perfect Career Path</h1>
            <p>Answer 10 questions and find careers that match your personality, interests, and goals!</p>
            <button class="start-btn" onclick="startQuiz()">
                ✨ Start Career Quiz
            </button>
        </div>

        <!-- Quiz Section -->
        <div class="quiz-section" id="quizSection">
            <div class="quiz-card">
                <!-- Progress Bar -->
                <div class="progress-container">
                    <div class="progress-text">
                        <span>Question <span id="currentQuestion">1</span> of 10</span>
                        <span id="progressPercent">10%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="progressBar" style="width: 10%"></div>
                    </div>
                </div>

                <!-- Question -->
                <div class="question-container">
                    <div class="question-icon" id="questionIcon">🤔</div>
                    <div class="question-text" id="questionText">Loading...</div>
                </div>

                <!-- Answers -->
                <div class="answers-grid" id="answersGrid">
                    <!-- Answers will be inserted here by JavaScript -->
                </div>

                <!-- Navigation Buttons -->
                <div class="quiz-nav-buttons">
                    <button class="quiz-btn btn-previous" id="prevBtn" onclick="previousQuestion()" style="display: none;">
                        ← Previous
                    </button>
                    <button class="quiz-btn btn-next" id="nextBtn" onclick="nextQuestion()" disabled>
                        Next →
                    </button>
                </div>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="resultsSection">
            <div class="results-header">
                <h2>🎉 Your Perfect Career Matches!</h2>
                <p>Based on your answers, here are the careers that suit you best:</p>
            </div>

            <div id="careerResults">
                <!-- Career cards will be inserted here by JavaScript -->
            </div>

            <div class="retake-section">
                <button class="retake-btn" onclick="retakeQuiz()">
                    🔄 Retake Quiz
                </button>
            </div>
        </div>
    </div>

    <script src="career-quiz.js"></script>
</body>
</html>
