<!DOCTYPE html>
<html>
<head>
    <title>Migrate Users</title>
</head>
<body>
    <h1>Migration Tool</h1>
    <button onclick="migrateUsers()">Run Migration</button>
    <pre id="log"></pre>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqcET4vhCP-fRZi4AVDIbmh9J6__Ec8l0",
            authDomain: "hst-mm.firebaseapp.com",
            projectId: "hst-mm",
            storageBucket: "hst-mm.appspot.com",
            messagingSenderId: "261062104857",
            appId: "1:261062104857:web:99da060e35650b69919788"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.migrateUsers = async function() {
            const log = document.getElementById('log');
            log.textContent = 'Starting migration...\n\n';

            try {
                const snapshot = await getDocs(collection(db, "users"));
                let count = 0;

                for (const docSnap of snapshot.docs) {
                    const data = docSnap.data();
                    const updates = {};

                    // Add missing fields
                    if (!data.name) updates.name = data.email?.split('@')[0] || 'User';
                    if (!data.city) updates.city = '';
                    if (!data.educationLevel) updates.educationLevel = 'school';
                    if (!data.school) updates.school = '';
                    if (!data.grade) updates.grade = '';
                    if (!data.stream) updates.stream = '';
                    if (!data.university) updates.university = '';
                    if (!data.major) updates.major = '';
                    if (!data.year) updates.year = '';
                    if (!data.bio) updates.bio = '';
                    if (!data.avatar) updates.avatar = '';
                    if (!data.certificates) updates.certificates = [];
                    if (!data.createdAt) updates.createdAt = new Date().toISOString();

                    // Update if needed
                    if (Object.keys(updates).length > 0) {
                        await updateDoc(docSnap.ref, updates);
                        count++;
                        log.textContent += `✅ Updated: ${docSnap.id}\n`;
                    }
                }

                log.textContent += `\n🎉 Migration complete! Updated ${count} users.`;
            } catch (error) {
                log.textContent += `❌ Error: ${error.message}`;
            }
        };
    </script>
</body>
</html>
